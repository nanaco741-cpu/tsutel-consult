// index.htmlの <script> タグの中、fetchの部分をこれに差し替えてください
            try {
                const res = await fetch("./api/gemini", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: profession + "の方が「" + passion + "」という想いを伝えるための、4コマ漫画の構成案を作成してください。" })
                });

                const data = await res.json();

                // 【最重要】物語を抽出するための「執念の3段構え」
                // 1. ChatGPT推奨の深い階層 2. サーバーで加工された場合 3. どちらもダメなら生データを出す
                const text = data?.candidates?.?.content?.parts?.?.text 
                          || data?.text 
                          || (data?.candidates ? "構造エラー: " + JSON.stringify(data).substring(0, 50) : null);

                if (text) {
                    resultContent.innerText = text;
                    resultBox.classList.remove('hidden');
                    resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    statusBox.innerText = "解析失敗。内容: " + JSON.stringify(data).substring(0, 100);
                    statusBox.classList.remove('hidden');
                }
            } catch (e) {
                statusBox.innerText = "通信に失敗しました。";
                statusBox.classList.remove('hidden');
            }
