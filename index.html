<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIコンセプト診断 | TSUTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800 pb-32">

    <header class="bg-[#005088] text-white pt-12 pb-20 px-6 text-center relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-2xl font-black mb-1">AIコンセプト診断</h1>
            <p class="text-[10px] opacity-80 tracking-widest uppercase font-bold">AI Concept Workshop by TSUTEL</p>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-12 space-y-8 relative z-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border-b-4 border-slate-200 fade-in">
            <h2 class="text-lg font-bold text-[#005088] mb-4 text-center">想いを、共感を生む4コマ物語へ。</h2>
            <p class="text-xs text-slate-500 text-center leading-relaxed">わずか30秒で、プロに相談前の「イメージ」が見えてきます。</p>
        </div>

        <section class="bg-white rounded-3xl shadow-xl p-8 border-t-4 border-amber-400 fade-in">
            <div id="statusMessage" class="hidden p-4 rounded-xl text-xs font-bold text-center mb-6 bg-red-100 text-red-700 border border-red-200"></div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">業種</label>
                    <input id="userProfession" type="text" placeholder="例：経営コンサルタント" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#005088] outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">伝えたい想い</label>
                    <textarea id="userMessage" rows="3" placeholder="例：誰にも負けない技術でお客様を笑顔にしたい" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#005088] outline-none"></textarea>
                </div>
                <button id="generateBtn" class="w-full bg-[#005088] text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span id="btnText">AI診断をスタートする</span>
                </button>
            </div>

            <div id="loading" class="mt-8 hidden text-center">
                <div class="inline-block w-8 h-8 border-4 border-[#005088] border-t-transparent rounded-full animate-spin-custom"></div>
                <p class="text-xs text-slate-400 mt-2 font-bold">三神AIが構成案を練っています...</p>
            </div>

            <div id="aiResult" class="mt-8 hidden space-y-4 fade-in">
                <div class="p-6 bg-slate-900 text-white rounded-2xl border-l-4 border-amber-400 shadow-xl">
                    <div id="aiResultContent" class="text-sm leading-relaxed whitespace-pre-wrap font-medium"></div>
                </div>
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <p class="text-[11px] text-blue-800 font-bold text-center">
                        これは「下書き」です。ここから心を揺さぶる物語へ磨き上げるのが、私との無料相談の醍醐味です。
                    </p>
                </div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 w-full p-4 z-50">
        <button id="lineBtn" class="max-w-md mx-auto bg-[#06C755] text-white w-full py-4 rounded-full font-black shadow-lg flex items-center justify-center gap-4 active:scale-95 transition-all">
            <span class="text-[16px] font-black tracking-tight tracking-widest">無料でLINE相談する</span>
        </button>
    </div>

    <script>
        const lineId = "@039irhdw";

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const profession = document.getElementById('userProfession').value.trim();
            const passion = document.getElementById('userMessage').value.trim();
            const statusBox = document.getElementById('statusMessage');
            const resultBox = document.getElementById('aiResult');
            const resultContent = document.getElementById('aiResultContent');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('generateBtn');

            if (!profession || !passion) {
                statusBox.innerText = "項目をすべて入力してくださいね！";
                statusBox.classList.remove('hidden');
                return;
            }

            statusBox.classList.add('hidden');
            resultBox.classList.add('hidden');
            loading.classList.remove('hidden');
            btn.disabled = true;

            try {
                const response = await fetch("./api/gemini", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: `あなたはプロの漫画家です。${profession}の方が「${passion}」という想いを伝えるための、ターゲットの心に刺さる4コマ漫画の構成案を作成してください。1コマ目から4コマ目まで具体的に。` })
                });

                const data = await response.json();
                resultContent.innerText = data.text;
                resultBox.classList.remove('hidden');
                resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } catch (error) {
                statusBox.innerText = "通信エラーが発生しました。時間を置いてお試しください。";
                statusBox.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        });

        document.getElementById('lineBtn').addEventListener('click', () => {
            window.location.href = `https://line.me/R/ti/p/${lineId}`;
        });
    </script>
</body>
</html>
