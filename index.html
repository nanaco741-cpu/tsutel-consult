<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIコンセプト診断 | TSUTEL</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: 'Noto Sans JP', sans-serif; background:#f0f4f8; }
.fade-in { animation: fadeIn 0.5s ease-out forwards; }
@keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }
</style>
</head>
<body class="pb-24 text-slate-800">
<main class="max-w-md mx-auto px-4 mt-12 space-y-6">
    <section class="bg-white p-6 rounded-xl shadow-md border-t-4 border-amber-400 fade-in">
        <input id="userProfession" type="text" placeholder="業種" class="w-full p-3 mb-3 border rounded-lg text-sm focus:border-[#005088] outline-none">
        <input id="userMessage" type="text" placeholder="想い" class="w-full p-3 mb-3 border rounded-lg text-sm focus:border-[#005088] outline-none">
        <button id="generateBtn" class="w-full bg-[#005088] text-white py-3 rounded-lg font-bold">AI診断をスタート</button>
        <div id="loading" class="hidden mt-3 text-center">
            <div class="inline-block w-6 h-6 border-4 border-[#005088] border-t-transparent rounded-full spin"></div>
        </div>
        <div id="statusMessage" class="hidden mt-3 text-red-600 text-sm text-center"></div>
        <div id="aiResult" class="hidden mt-3 p-4 bg-slate-900 text-white rounded-lg text-sm whitespace-pre-wrap"></div>
    </section>
</main>
<div class="fixed bottom-4 left-0 w-full px-4">
    <button id="lineBtn" class="w-full bg-[#06C755] text-white py-3 rounded-full font-bold">無料で相談する</button>
</div>

<script>
const btn = document.getElementById('generateBtn');
btn.addEventListener('click', async () => {
    const prof = document.getElementById('userProfession').value.trim();
    const msg = document.getElementById('userMessage').value.trim();
    const status = document.getElementById('statusMessage');
    const result = document.getElementById('aiResult');
    const loading = document.getElementById('loading');

    if(!prof || !msg) {
        status.innerText = "項目を入力してください";
        status.classList.remove('hidden');
        return;
    }
    status.classList.add('hidden');
    result.classList.add('hidden');
    loading.classList.remove('hidden');
    btn.disabled = true;

    try {
        const res = await fetch("./api/gemini", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({prompt:`${prof}が「${msg}」想いを伝える4コマを40文字以内で作成。挨拶禁止、解説禁止`})
        });
        if(!res.ok) throw new Error("API未応答 "+res.status);
        const data = await res.json();
        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "回答なし";
        result.innerText = text;
        result.classList.remove('hidden');
    } catch(e) {
        status.innerText = "エラー: "+e.message;
        status.classList.remove('hidden');
    } finally {
        loading.classList.add('hidden');
        btn.disabled = false;
    }
});

document.getElementById('lineBtn').addEventListener('click',()=>{
    window.location.href="https://line.me/R/ti/p/@039irhdw";
});
</script>
</body>
</html>
