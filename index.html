<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIコンセプト診断 | TSUTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-800 pb-32">
    <header class="bg-[#005088] text-white py-12 text-center">
        <h1 class="text-2xl font-black">AIコンセプト診断</h1>
    </header>
    <main class="max-w-md mx-auto px-4 -mt-8">
        <section class="bg-white rounded-3xl shadow-xl p-8 border-t-4 border-amber-400">
            <div id="statusMessage" class="hidden p-4 rounded-xl text-xs font-bold text-center mb-6 bg-red-100 text-red-700"></div>
            <div class="space-y-6">
                <input id="userProfession" type="text" placeholder="業種を入力" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                <textarea id="userMessage" rows="3" placeholder="伝えたい想いを入力" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm"></textarea>
                <button id="generateBtn" class="w-full bg-[#005088] text-white py-4 rounded-xl font-black shadow-lg">AI診断をスタートする</button>
            </div>
            <div id="loading" class="mt-8 hidden text-center">
                <p class="text-xs text-slate-400">AIが作成中...</p>
            </div>
            <div id="aiResult" class="mt-8 hidden">
                <div class="p-6 bg-slate-900 text-white rounded-2xl border-l-4 border-amber-400 shadow-xl">
                    <div id="aiResultContent" class="text-sm leading-relaxed whitespace-pre-wrap"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const profession = document.getElementById('userProfession').value.trim();
            const passion = document.getElementById('userMessage').value.trim();
            const statusBox = document.getElementById('statusMessage');
            const resultBox = document.getElementById('aiResult');
            const resultContent = document.getElementById('aiResultContent');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('generateBtn');

            if (!profession || !passion) {
                statusBox.innerText = "すべて入力してください！";
                statusBox.classList.remove('hidden');
                return;
            }

            statusBox.classList.add('hidden');
            resultBox.classList.add('hidden');
            loading.classList.remove('hidden');
            btn.disabled = true;

            try {
                const response = await fetch("./api/gemini", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: `${profession}の人が「${passion}」を伝える4コマ漫画の案を考えて。` })
                });
                const data = await response.json();
                resultContent.innerText = data.text;
                resultBox.classList.remove('hidden');
            } catch (error) {
                statusBox.innerText = "エラーが発生しました。";
                statusBox.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
