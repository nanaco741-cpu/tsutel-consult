<script>
    document.getElementById('generateBtn').addEventListener('click', async () => {
        const profession = document.getElementById('userProfession').value.trim();
        const passion = document.getElementById('userMessage').value.trim();
        const statusBox = document.getElementById('statusMessage');
        const resultBox = document.getElementById('aiResult');
        const resultContent = document.getElementById('aiResultContent');
        const loading = document.getElementById('loading');
        const btn = document.getElementById('generateBtn');

        if (!profession || !passion) {
            statusBox.innerText = "項目をすべて入力してくださいね！";
            statusBox.classList.remove('hidden');
            return;
        }

        statusBox.classList.add('hidden');
        resultBox.classList.add('hidden');
        loading.classList.remove('hidden');
        btn.disabled = true;

        try {
            const res = await fetch("./api/gemini", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: profession + "の方が「" + passion + "」という想いを伝えるための、心に刺さる4コマ漫画の構成案を作成してください。" })
            });

            const data = await res.json();
            console.log("取得データ:", data); // ブラウザの検証画面で見れるようにします

            // 最も確実な抽出方法（?. を使わずに書きます）
            let storyText = "";
            if (data && data.candidates && data.candidates && data.candidates.content && data.candidates.content.parts && data.candidates.content.parts) {
                storyText = data.candidates.content.parts.text;
            } else if (data.text) {
                storyText = data.text;
            }

            if (storyText) {
                resultContent.innerText = storyText;
                resultBox.classList.remove('hidden');
                resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                statusBox.innerText = "物語の取得に失敗しました。";
                statusBox.classList.remove('hidden');
            }
        } catch (e) {
            statusBox.innerText = "通信エラーが発生しました: " + e.message;
            statusBox.classList.remove('hidden');
        } finally {
            loading.classList.add('hidden');
            btn.disabled = false;
        }
    });

    document.getElementById('lineBtn').addEventListener('click', () => {
        window.location.href = "https://line.me/R/ti/p/@039irhdw";
    });
</script>
