<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIコンセプト診断 & 無料相談 | TSUTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800 pb-32">

<header class="bg-[#005088] text-white pt-12 pb-20 px-6 text-center relative overflow-hidden">
    <div class="relative z-10">
        <div class="mb-4 inline-block">
            <img src="me.png" class="w-20 h-20 rounded-full border-4 border-amber-400 mx-auto object-cover shadow-lg" onerror="this.style.display='none'">
        </div>
        <h1 class="text-2xl font-black mb-1">AIコンセプト診断</h1>
        <p class="text-[10px] opacity-80 tracking-widest uppercase font-bold">AI Concept Workshop by TSUTEL</p>
    </div>
</header>

<main class="max-w-md mx-auto px-4 -mt-12 space-y-8 relative z-20">

<div class="bg-white rounded-3xl shadow-xl p-8 border-b-4 border-slate-200 fade-in">
    <h2 class="text-lg font-bold text-[#005088] mb-4 text-center">
        あなたの「強み」を、<br><span class="text-amber-500 text-xl">4コマの物語</span>に。
    </h2>
</div>

<section class="bg-white rounded-3xl shadow-xl p-8 border-t-4 border-amber-400 fade-in">

<div id="statusMessage" class="hidden p-4 rounded-xl text-xs font-bold text-center mb-6 bg-red-100 text-red-700"></div>

<div class="space-y-6">
<input id="userProfession" type="text" placeholder="業種" class="w-full p-4 border rounded-xl">
<textarea id="userPassion" rows="3" placeholder="伝えたいこと" class="w-full p-4 border rounded-xl"></textarea>

<button id="generateBtn" class="w-full bg-[#005088] text-white py-4 rounded-xl font-black flex justify-center items-center gap-2">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    <span id="btnText">AI診断をスタートする</span>
</button>
</div>

<div id="loading" class="mt-8 hidden text-center">
    <div class="inline-block w-8 h-8 border-4 border-[#005088] border-t-transparent rounded-full animate-spin-custom"></div>
    <p class="text-xs mt-2">AIが生成中...</p>
</div>

<div id="aiResult" class="mt-8 hidden">
    <div class="p-6 bg-slate-900 text-white rounded-2xl">
        <div id="aiResultContent"></div>
    </div>
</div>

</section>
</main>

<div class="fixed bottom-6 left-4 right-4">
<button id="lineBtn" class="bg-[#06C755] text-white w-full py-4 rounded-full font-bold">
無料で相談する
</button>
</div>

<script>
const lineId = "@039irhdw";

async function generateAIConcept() {

    const profession = document.getElementById('userProfession').value.trim();
    const passion = document.getElementById('userPassion').value.trim();

    const statusBox = document.getElementById('statusMessage');
    const resultDiv = document.getElementById('aiResult');
    const resultContent = document.getElementById('aiResultContent');
    const loading = document.getElementById('loading');
    const btn = document.getElementById('generateBtn');
    const btnText = document.getElementById('btnText');

    if (!profession || !passion) {
        statusBox.innerText = "入力してください";
        statusBox.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btnText.innerText = "思考中...";
    loading.classList.remove('hidden');
    resultDiv.classList.add('hidden');

    try {
        const res = await fetch("/api/gemini", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                prompt: `業種:${profession}\n想い:${passion}\n4コマ構成を作成`
            })
        });

        if (!res.ok) throw new Error();

        const data = await res.json();

        resultContent.innerText = data.text || "生成失敗";
        resultDiv.classList.remove('hidden');

    } catch {
        statusBox.innerText = "エラーが発生しました";
        statusBox.classList.remove('hidden');
    }

    loading.classList.add('hidden');
    btn.disabled = false;
    btnText.innerText = "AI診断をスタートする";
}

function openLineConsult() {
    window.location.href = `https://line.me/R/ti/p/${lineId}`;
}

window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('generateBtn').addEventListener('click', generateAIConcept);
    document.getElementById('lineBtn').addEventListener('click', openLineConsult);
});
</script>

</body>
</html>
