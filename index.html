<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIコンセプト診断 & 無料相談 | TSUTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800 pb-32">

<header class="bg-[#0b409e] text-white pt-12 pb-20 px-6 text-center relative overflow-hidden">
    <div class="relative z-10">
        <div class="mb-4 inline-block">
            <img src="me.png" class="w-20 h-20 rounded-full border-4 border-amber-400 mx-auto object-cover shadow-lg" onerror="this.style.display='none'">
        </div>
        <h1 class="text-2xl font-black mb-1 text-white">AIコンセプト診断</h1>
        <p class="text-[10px] opacity-80 tracking-widest uppercase text-white font-bold">AI Concept Workshop by TSUTEL</p>
    </div>
</header>

<main class="max-w-md mx-auto px-4 -mt-12 space-y-8 relative z-20">

    <div class="bg-white rounded-3xl shadow-xl p-8 border-b-4 border-slate-200 fade-in">
        <h2 class="text-lg font-bold text-[#0b409e] mb-4 leading-tight text-center">
            あなたのビジネスを、<br>
            <span class="text-amber-500 text-xl">今すぐ4コマ物語に。</span>
        </h2>
        <p class="text-xs text-slate-500 leading-relaxed text-center">
            入力は30秒で完了。<br>
            ここから、新しい名刺の物語が始まります。
        </p>
    </div>

    <section class="bg-white rounded-3xl shadow-xl p-8 border-t-4 border-amber-400 fade-in">
        <div id="statusMessage" class="hidden p-4 rounded-xl text-xs font-bold text-center mb-6 bg-red-100 text-red-700 border border-red-200"></div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 ml-1">Profession / 業種</label>
                <input id="userProfession" type="text" placeholder="例：経営コンサルタント、整体師など" 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#0b409e] transition-all">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 ml-1">Message / 伝えたいこと</label>
                <textarea id="userPassion" rows="3" placeholder="例：誰にも負けない技術がある、お客様を笑顔にしたいなど" 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#0b409e] transition-all"></textarea>
            </div>
            <button id="generateBtn" 
                class="w-full bg-[#0b409e] text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span id="btnText">AI診断をスタートする</span>
            </button>
        </div>

        <div id="loading" class="mt-8 hidden text-center">
            <div class="inline-block w-8 h-8 border-4 border-[#0b409e] border-t-transparent rounded-full animate-spin-custom"></div>
            <p class="text-xs text-slate-400 mt-2 font-bold">三神AIが構成案を練っています...</p>
        </div>

        <div id="aiResult" class="mt-8 hidden space-y-4 fade-in">
            <div class="p-6 bg-slate-900 text-white rounded-2xl relative overflow-hidden border-l-4 border-amber-400 shadow-xl">
                <div class="absolute top-0 right-0 p-2 opacity-10 text-4xl"><i class="fa-solid fa-quote-right"></i></div>
                <h4 class="text-[10px] font-bold text-amber-400 mb-4 tracking-widest uppercase">
                    AI Concept Prototype / 4コマ構成案
                </h4>
                <div id="aiResultContent" class="text-sm leading-relaxed whitespace-pre-wrap"></div>
            </div>

            <div class="bg-blue-50 p-6 rounded-xl border border-blue-100">
                <p class="text-[11px] text-blue-800 font-bold">
                    この結果はあくまでイメージ案です。ここから本当の武器を引き出し、心に刺さる物語へ磨き上げるのが無料相談の価値です。
                </p>
            </div>
        </div>
    </section>
</main>

<div class="fixed bottom-6 left-4 right-4 z-50">

    <!-- ★変更：これだけ残す -->
    <p class="text-[11px] text-center text-slate-500 mb-2 font-bold">
        3秒で送れます
    </p>

    <button id="lineBtn" class="bg-[#06C755] text-white w-full py-4 rounded-[2rem] font-black shadow-2xl flex items-center justify-center gap-2 active:scale-95 transition-all border-b-4 border-green-700">
        <i class="fa-brands fa-line text-2xl"></i>
        <span class="text-[15px] sm:text-[16px] font-bold">
            売れる構成に無料で改善する
        </span>
    </button>
</div>

<script>
const lineId = "@039irhdw";

async function generateAIConcept() {
    const profession = document.getElementById('userProfession').value.trim();
    const passion = document.getElementById('userPassion').value.trim();

    const statusBox = document.getElementById('statusMessage');
    const resultDiv = document.getElementById('aiResult');
    const resultContent = document.getElementById('aiResultContent');
    const loading = document.getElementById('loading');
    const btn = document.getElementById('generateBtn');
    const btnText = document.getElementById('btnText');

    if (!profession || !passion) {
        statusBox.innerText = "項目をすべて入力してくださいね！";
        statusBox.classList.remove('hidden');
        return;
    }

    statusBox.classList.add('hidden');
    resultDiv.classList.add('hidden');
    loading.classList.remove('hidden');
    btn.disabled = true;
    btnText.innerText = "思考中...";

    try {
        const response = await fetch("./api/gemini", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                prompt: `業種「${profession}」が「${passion}」を伝える4コマ構成`
            })
        });

        const data = await response.json();
        resultContent.innerText = data.text || "生成失敗";

        resultDiv.classList.remove('hidden');
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });

    } catch (e) {
        statusBox.innerText = "エラーが発生しました";
        statusBox.classList.remove('hidden');
    } finally {
        loading.classList.add('hidden');
        btn.disabled = false;
        btnText.innerText = "AI診断をスタートする";
    }
}

function openLineConsult() {
    const aiText = document.getElementById('aiResultContent').innerText.trim();

    const finalMessage = `${aiText}

この構成、売れる形に直せるか見てほしいです。`;

    const encoded = encodeURIComponent(finalMessage);

    window.location.href = `https://line.me/R/oaMessage/${lineId}/${encoded}`;
}

window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('generateBtn').addEventListener('click', generateAIConcept);
    document.getElementById('lineBtn').addEventListener('click', openLineConsult);
});
</script>

</body>
</html>
